name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web-check:
    name: Web Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test Build
        run: npm run build
        env:
          # Dummy values to allow Next.js build to pass if it requires env vars
          TURSO_DATABASE_URL: "libsql://dummy.turso.io"
          TURSO_AUTH_TOKEN: "dummy_token"
          NEXT_PUBLIC_BOT_USERNAME: "dummy_bot"
          BOT_TOKEN: "dummy:token"
          STORAGE_CHANNEL_ID: "-100000000"

  bot-check:
    name: Bot Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python Syntax
        run: python -m py_compile *.py
