# Telegram Cloud Drive — full stack for a VPS / AWS EC2.
#
# Portable by design: to move to ANOTHER host later, copy this repo + your `.env` +
# `bot/worker.session`, then run `docker compose up -d --build`. Nothing is tied to a
# specific cloud — only Turso (managed) lives outside.
#
# Before first run:
#   1) cp .env.example .env   and fill it in
#   2) make sure bot/worker.session exists (run the Telethon login once) — it is
#      bind-mounted into the watcher so it survives rebuilds.
#   3) apply bot/migration-staged-uploads.sql to your Turso DB.
#
# web & watcher share the `staging` volume: the browser uploads land in /staging,
# the watcher reads them there and deletes them after pushing to Telegram.

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_BOT_USERNAME: ${NEXT_PUBLIC_BOT_USERNAME:-}
        TURSO_DATABASE_URL: ${TURSO_DATABASE_URL}
        TURSO_AUTH_TOKEN: ${TURSO_AUTH_TOKEN}
    env_file: .env
    environment:
      UPLOAD_STAGING_DIR: /staging
      STREAMER_URL: http://streamer:8080
    ports:
      - "3000:3000"
    volumes:
      - staging:/staging
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TG_API_ID}
      TELEGRAM_API_HASH: ${TG_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: ["python", "-u", "bot.py"]
    env_file: .env
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  watcher:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: ["sh", "-c", "python -u index_history.py && python -u watcher.py"]
    env_file: .env
    environment:
      WORKER_OUT_DIR: /staging/_parts
    volumes:
      - staging:/staging
      - ./bot/worker.session:/app/worker.session
    restart: unless-stopped

  streamer:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: ["python", "-u", "streamer.py"]
    env_file: .env
    environment:
      CACHE_DIR: /cache
      CACHE_MAX_SIZE_GB: "15"            # auto-cleanup (LRU) if exceeded
      PREFETCH_BUFFER_MB: "16"           # YouTube-style: buffer 16 MB ahead
      CHUNK_SIZE_MB: "1"                 # 1 MB per chunk (responsive seeking)
      INITIAL_CHUNKS: "4"               # fast start: download first 4 MB
      PREFETCH_TIMEOUT_S: "90"           # stop prefetch after 90s idle
      STREAMER_SESSION: streamer
      TELEGRAM_API_URL: http://telegram-bot-api:8081
      # --- background video compression (original stays in the evictable cache;
      #     the smaller H.264 copy is written to the PERSISTENT /compressed volume) ---
      COMPRESSED_DIR: /compressed
      VIDEO_COMPRESS: "1"               # set 0 to disable transcoding entirely
      VIDEO_CRF: "23"                   # 18=near-lossless … 28=smaller
      VIDEO_PRESET: veryfast            # x264 speed/size; veryfast keeps the 2-core box responsive (medium pins it for >1h)
      VIDEO_MIN_COMPRESS_MB: "20"       # skip files smaller than this
      VIDEO_TRANSCODE_CONCURRENCY: "1"  # parallel ffmpeg jobs (CPU-heavy)
      VIDEO_TRANSCODE_THREADS: "0"      # 0 = ffmpeg auto (all cores); 1-2 = leave a core free. We also `nice` it.
      COMPRESSED_MAX_SIZE_GB: "0"       # 0 = keep forever; >0 = LRU-cap the dir
      # --- background subtitle generation (Groq Whisper STT + translation) ---
      SUBTITLE_GEN: "1"                 # set 0 to disable subtitle generation
      SUBTITLES_DIR: /subtitles         # PERSISTENT — generated VTT tracks live here
      GROQ_API_KEYS: ${GROQ_API_KEYS:-} # comma-separated Groq keys (rotated on 429)
      GROQ_STT_MODELS: whisper-large-v3-turbo,whisper-large-v3
      SUBTITLE_TARGET_LANGS: en,id      # translate every video into these (besides original)
      SUBTITLE_CHUNK_SECONDS: "600"     # audio chunk length to stay under Groq's file cap
      SUBTITLE_CHUNK_CONCURRENCY: "0"   # 0 = auto (= #keys): transcribe that many chunks at once, each on its own key
      SUBTITLE_CHUNK_RETRY_ATTEMPTS: "3"    # in-job retries for a transient chunk failure (before leaving it for repair)
      SUBTITLE_CHUNK_RETRY_DELAY_S: "20"    # back-off between those in-job retries
      SUBTITLE_MAX_REPAIR_ATTEMPTS: "4"     # cross-pass repair budget before finalising a still-incomplete video
      SUBTITLE_TRANSLATE_RETRY: "3"         # retries when Google returns a no-op/throttled translation
      SUBTITLE_TRANSLATE_RETRY_DELAY_S: "4" # back-off between translation retries
      SUBTITLE_TL_REPAIR_MAX: "5"           # passes allowed to fix a part's missing target languages
      # --- retroactive backfill: slowly subtitle already-indexed videos (one at a time) ---
      SUBTITLE_BACKFILL: "1"            # set 0 to only subtitle on-demand (no backfill)
      SUBTITLE_BACKFILL_INTERVAL_S: "0"     # extra pace between videos; 0 = back-to-back (3 keys handle Groq)
      SUBTITLE_BACKFILL_IDLE_S: "3600"      # re-scan interval when nothing is left to do
      SUBTITLE_BACKFILL_START_DELAY_S: "20"   # short settle window after startup before the first backfill
    volumes:
      - cache:/cache                     # expendable — can be pruned anytime
      - compressed:/compressed           # PERSISTENT — compressed videos live here
      - subtitles:/subtitles             # PERSISTENT — generated subtitle tracks live here
      - ./bot/streamer.session:/app/streamer.session
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

volumes:
  staging:
  cache:         # video streaming cache — expendable, data lives in Telegram
  compressed:    # compressed video copies — persistent (CPU-expensive to rebuild)
  subtitles:     # generated subtitle tracks — persistent (kept while video is indexed)
  telegram-bot-api-data:

